name: Trade Capture Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write


    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21 + Maven Cache
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3️⃣ Build All Modules from Parent
      - name: Build all modules and Verify
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -T 1C -B clean verify

      # 4️⃣ Run Trivy (Filesystem Scan)
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # 5️⃣ Upload JaCoCo Aggregate Report
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco-aggregate
          if-no-files-found: ignore

      # 6️⃣ Upload OWASP Report
      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore

      # 7 Upload All Built JARs
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trade-capture-jars
          path: |
            **/target/*.jar
          if-no-files-found: ignore