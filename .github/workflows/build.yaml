name: Trade Capture Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Java 21 + Maven Cache
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3️⃣ Build All Modules from Parent
      - name: Build all modules
        run: mvn -B clean verify

      # 4️⃣ Upload All Built JARs
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trade-capture-jars
          path: |
            **/target/*.jar
          if-no-files-found: ignore