#Boot Server Config
server.port=8080

#Spring App Config
spring.application.name=tcap-ingestor

#Actuator Config
management.endpoints.web.exposure.include=*

#Application Configs

#DB Configurations
spring.datasource.url=jdbc:h2:mem:trades
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false


#Kafka Configurations
spring.kafka.bootstrap-servers=localhost:9092

#Kafka Producer Config
spring.kafka.producer.key-serializer = org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer = org.springframework.kafka.support.serializer.JsonSerializer

#Kafka Consumer Config
spring.kafka.consumer.group-id=trade-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.type=batch
spring.kafka.listener.ack-mode=manual
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=100
#spring.kafka.consumer.concurrency=2
spring.kafka.consumer.key-deserializer = org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer =  org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages =  "*"
spring.kafka.consumer.properties.spring.json.value.default.type=com.assn.tcap.ingestor.model.TradeDTO


